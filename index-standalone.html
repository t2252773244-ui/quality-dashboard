      }
      /* 自定义滚动条 */

        width: 8px;
        height: 8px;
      }

      }

      /* 自定义按钮样式 */

        padding: 0.5rem 1rem;

      }
      .btn-outline {
        border: 1px solid #d1d5db;
        background: white;
      }
      .btn-outline:hover {
        background: #f3f4f6;

      /* 自定义卡片样式 */

      .card:hover {

      /* 自定义表格样式 */

      }

        text-align: left;
        font-size: 0.875rem;
        font-weight: 500;
        color: #4b5563;
        background: #f9fafb;

      }
      .table td {

        font-size: 0.875rem;
        border-bottom: 1px solid #e5e7eb;
      }
      .table tr:hover {
        background: #f9fafb;
      }

        .main-content {
          margin-right: 0;
        }
        .right-panel {
          display: none;
        }

                      '我的复判',
                      '我的审批',

                    color="bg-success"
                  >

                      {/* 我的待办 */}

                        <div className="space-y-2">
                          {myWorkData.todos.map((todo) => (
                            <div key={todo.id} className="p-2 border border-gray-100 rounded-lg">

                              <div className="flex justify-between items-center mt-1">
                                <span className="text-xs text-gray-600">截止：{todo.deadline}</span>

                              </div>

                                <th>时间</th>

                            <tbody>
                              {myWorkData.reviews.map((review) => (
                                <tr key={review.id}>
                                  <td className="text-sm">{review.serial}</td>

                                    <span className={`text-xs px-2 py-1 rounded ${review.result === '通过' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>

                                  </td>
                                  <td className="text-sm">{review.time}</td>

                          </div>
                        </div>
                      </div>

                      {/* 我的收藏 */}
                      <div className="bg-white p-3 rounded-lg border border-gray-200">
                        <h4 className="text-sm font-semibold mb-2">我的收藏</h4>
                        <div className="space-y-2">
                          <div className="flex items-center p-2 border border-gray-100 rounded-lg hover:bg-gray-50">
                            <span className="mr-3">📏</span>
                            <span className="text-sm">划痕检测规则 v1.2</span>
                          </div>
                          <div className="flex items-center p-2 border border-gray-100 rounded-lg hover:bg-gray-50">
                            <span className="mr-3">📊</span>
                            <span className="text-sm">生产概览看板</span>
                          </div>
                          <div className="flex items-center p-2 border border-gray-100 rounded-lg hover:bg-gray-50">
                            <span className="mr-3">⚙️</span>
                            <span className="text-sm">系统配置页面</span>
                          </div>
                        </div>
                      </div>
                    </div>

      // 渲染应用
      ReactDOM.createRoot(document.getElementById('root')).render(
        <React.StrictMode>
